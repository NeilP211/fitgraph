services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fitgraph
      POSTGRES_PASSWORD: fitgraph
      POSTGRES_DB: fitgraph
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitgraph -d fitgraph"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
